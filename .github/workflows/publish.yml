name: Compile LaTeX for Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          root_file: quaternion.tex

      - name: Prepare Pages content
        run: |
          mkdir public
          cp quaternion.pdf public/quaternion.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a7d6fb6c8d760b3278cc933d7d208346f3d # v4
        with:
          path: public

      - name: Deploy to Pages
        uses: actions/deploy-pages@4d90baf09e6b2c2505702c8788b21f8d5d6f2cbb # v4
