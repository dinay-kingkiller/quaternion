name: Build LaTeX PDF

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: quaternion.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: quaternion-pdf
          path: quaternion.pdf
